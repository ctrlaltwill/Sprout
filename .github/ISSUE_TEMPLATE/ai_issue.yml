name: Companion AI Issue
description: Report a bug with Companion chat or Companion tests
title: "[Companion AI]: "
labels: ["bug", "ai"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Companion AI issue.
        Please include as much detail as you can about where the problem happened, which provider/model you used, and what you expected to happen.

  - type: textarea
    id: issue-summary
    attributes:
      label: What isn't working?
      description: Give a short description of the problem.
      placeholder: "Example: Companion chat works, but generating tests fails with a 400 error when I use attachments."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce the issue.
      placeholder: |
        1. Open Companion
        2. Select provider/model
        3. Ask it to ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
      placeholder: "Example: The response should have streamed normally and returned flashcards."
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: LearnKit Version
      description: What version of LearnKit are you using?
      placeholder: "e.g., 1.3.0"
    validations:
      required: true

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian Version
      description: What version of Obsidian are you using?
      placeholder: "e.g., 1.8.9"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      options:
        - macOS
        - Windows
        - Linux
        - iOS
        - Android
        - Other / Unsure
    validations:
      required: true

  - type: dropdown
    id: companion-area
    attributes:
      label: Where did this happen?
      description: Which interface had the issue?
      options:
        - Chat Interface
        - Test Interface
        - Both
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: workflow
    attributes:
      label: What were you trying to do?
      description: Pick the closest workflow.
      options:
        - General chat
        - Review a note
        - Edit a note
        - Generate flashcards
        - Generate tests
        - Grade tests
        - Use linked notes
        - Use file attachments
        - Other / Unsure
    validations:
      required: true

  - type: dropdown
    id: companion-provider
    attributes:
      label: AI Provider
      description: Which provider were you using in Companion?
      options:
        - OpenAI
        - Anthropic
        - DeepSeek
        - xAI (Grok)
        - Google (Gemini)
        - Perplexity
        - OpenRouter
        - Custom
        - Not sure
    validations:
      required: true

  - type: input
    id: companion-model
    attributes:
      label: Model Name
      description: Which model were you using?
      placeholder: "e.g., gpt-5, deepseek-chat, claude-sonnet-4-5"
    validations:
      required: false

  - type: input
    id: error-message
    attributes:
      label: Error Message (if any)
      description: Paste any specific error codes or messages you saw.
      placeholder: "e.g., 400 Bad Request, 429 Rate Limit, context length exceeded"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add anything else that will help reproduce or debug the issue.
      placeholder: |
        Screenshots, copied prompts, provider responses, note setup, whether linked notes or attachments were enabled, and any other useful details.
    validations:
      required: false
