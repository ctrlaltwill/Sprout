name: Companion AI Issue Report
description: Report an issue with Companion AI features (non-TTS)
title: "[Companion AI]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report issues with Companion AI features.
        For Text-to-Speech issues, please use the dedicated TTS issue form.

  - type: input
    id: plugin-version
    attributes:
      label: LearnKit Version
      description: What version of LearnKit are you using?
      placeholder: "e.g., 1.3.0"
    validations:
      required: true

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian Version
      description: What version of Obsidian are you using?
      placeholder: "e.g., 1.8.9"
    validations:
      required: true

  - type: dropdown
    id: companion-location
    attributes:
      label: Where Did This Happen?
      description: Which Companion area had the issue?
      options:
        - Tests
        - Chat Interface (Widget / Popup)
    validations:
      required: true

  - type: dropdown
    id: companion-test-action
    attributes:
      label: Tests Action
      description: If this happened in Tests, what were you doing?
      options:
        - N/A
        - Generating Tests
        - Grading Tests
    validations:
      required: false

  - type: dropdown
    id: companion-chat-action
    attributes:
      label: Chat Action
      description: If this happened in Chat, what were you doing?
      options:
        - N/A
        - General Chat
        - Editing Notes
        - Reviewing Notes
        - Generating Flashcards
        - Generating Tests
    validations:
      required: false

  - type: dropdown
    id: companion-provider
    attributes:
      label: AI Provider
      description: Which provider were you using in Companion?
      options:
        - OpenAI
        - Anthropic
        - DeepSeek
        - xAI (Grok)
        - Google (Gemini)
        - Perplexity
        - OpenRouter
        - Custom
    validations:
      required: false

  - type: input
    id: companion-model
    attributes:
      label: Model Name
      description: Which model were you using? (for example: gpt-4o, claude-sonnet-4-20250514, gemini-2.0-flash)
      placeholder: "e.g., gpt-4o"
    validations:
      required: false

  - type: input
    id: error-message
    attributes:
      label: Error Message (if any)
      description: Paste any specific error codes or messages you saw.
      placeholder: "e.g., 400 Bad Request, 429 Rate Limit, context length exceeded"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe what you were doing, what went wrong, and how it happened. Include what you expected vs what actually occurred.
      placeholder: |
        I was using Companion with Claude to generate flashcards from a long note.
        After submitting, I got a 400 error. The note is about 5,000 words.
        I expected flashcards to be generated but instead saw an error banner.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, console errors, or anything else that might help.
    validations:
      required: false
