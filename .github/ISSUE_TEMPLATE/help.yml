name: Help / Question
description: Ask a question or get help using LearnKit
title: "[Help]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Need help with LearnKit? Ask your question below. For general questions, please check the [docs site](https://ctrlaltwill.github.io/LearnKit/) first.

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What do you need help with?
      placeholder: "Example: How do I create image occlusion cards?"
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What Have You Tried?
      description: What have you tried so far or where did you look for an answer?
      placeholder: "I checked the docs and tried..."
    validations:
      required: false

  - type: input
    id: plugin-version
    attributes:
      label: LearnKit Version
      description: What version of LearnKit are you using?
      placeholder: "e.g., 1.0.3"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any screenshots or additional details here.
      placeholder: "Screenshots, examples, etc."
    validations:
      required: false
