name: TTS Issue Report
description: Report an issue with Text-to-Speech features
title: "[TTS]: "
labels: ["bug", "tts"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report Text-to-Speech issues.
        For Companion chat/editing/test issues, please use the Companion AI issue form.

  - type: input
    id: plugin-version
    attributes:
      label: LearnKit Version
      description: What version of LearnKit are you using?
      placeholder: "e.g., 1.3.0"
    validations:
      required: true

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian Version
      description: What version of Obsidian are you using?
      placeholder: "e.g., 1.8.9"
    validations:
      required: true

  - type: dropdown
    id: tts-provider
    attributes:
      label: TTS Provider
      description: Which TTS provider were you using?
      options:
        - OpenAI
        - ElevenLabs
        - Google Cloud
        - System (Web Speech API)
        - Custom HTTP Endpoint
    validations:
      required: true

  - type: dropdown
    id: playback-context
    attributes:
      label: Playback Context
      description: Where did the issue happen?
      options:
        - Flashcards
        - Multiple Choice Cards
        - Open Question Cards
        - Cloze Cards
        - Other / Unsure
    validations:
      required: true

  - type: dropdown
    id: tts-action
    attributes:
      label: Action
      description: What were you trying to do?
      options:
        - Generate Audio
        - Play Cached Audio
        - Replay Audio
        - Clear TTS Cache
        - Save TTS Settings
    validations:
      required: true

  - type: input
    id: tts-model-or-voice
    attributes:
      label: Model or Voice
      description: Which model or voice were you using? (for example: gpt-4o-mini-tts, ElevenLabs Multilingual v2)
      placeholder: "e.g., gpt-4o-mini-tts"
    validations:
      required: false

  - type: input
    id: error-message
    attributes:
      label: Error Message (If Any)
      description: Paste any specific error code or message you saw.
      placeholder: "e.g., 400 Bad Request, 429 Rate Limit"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What Happened?
      description: Describe what you did, what you expected, and what happened instead.
      placeholder: |
        I tried to play TTS on a flashcard.
        Audio generation failed with a 429 error.
        I expected the card audio to play.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add screenshots, logs, or anything else that can help us debug.
    validations:
      required: false
